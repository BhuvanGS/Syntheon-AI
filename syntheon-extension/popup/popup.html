<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syntheon AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="logo">
        <img src="../icons/icon48.png" alt="Syntheon AI" class="logo-icon">
        <h1>Syntheon AI</h1>
      </div>
    </header>

    <main class="popup-main">
      <div class="status-section">
        <div class="status-indicator">
          <div class="status-dot idle" id="statusDot"></div>
          <span id="statusText">Detecting meeting...</span>
        </div>
      </div>

      <div class="meeting-info">
        <div class="meeting-platform">
          <span class="platform-label">Platform</span>
          <span id="platformName">—</span>
        </div>
        <div class="meeting-url" id="meetingUrl">—</div>
      </div>

      <div class="controls-section">
        <button id="sendBotButton" class="send-bot-button" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/>
            <path d="M12 8v4l3 3"/>
          </svg>
          <span id="sendBotText">Send Bot to Meeting</span>
        </button>

        <button id="recordingsButton" class="control-button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M9 9h6M9 12h6M9 15h4"/>
          </svg>
          View Dashboard
        </button>
      </div>
    </main>

    <footer class="popup-footer">
      <div class="version">v1.0.0 — Powered by Skribby</div>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
